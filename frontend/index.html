<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon Links -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="/icon-192x192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="/icon-512x512.png"
    />
    <link rel="icon" type="image/png" href="/logo.png" />

    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="/icon-192x192.png" />

    <!-- Web App Manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Meta Tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="EduLattice - A collaborative learning platform where students share study materials, resources, and knowledge with their community"
    />
    <meta
      name="keywords"
      content="education, learning, resources, study materials, collaboration"
    />
    <meta name="theme-color" content="#0277BD" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="EduLattice" />

    <title>EduLattice - Learning Resource Sharing Platform</title>
    <style>
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #ffffff;
      }
      #splash p {
        margin-top: 16px;
        font-family: system-ui, sans-serif;
        font-size: 1.25rem;
        font-weight: 600;
        color: #46b2f2;
      }
    </style>
  </head>
  <body>
    <!-- Splash screen shown while the app loads -->
    <div id="splash">
      <img src="/logo.png" alt="EduLattice" width="120" height="120" />
      <p>EduLattice</p>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Hide splash once React mounts -->
    <script>
      const observer = new MutationObserver(() => {
        const root = document.getElementById("root");
        if (root && root.children.length > 0) {
          const splash = document.getElementById("splash");
          if (splash) {
            splash.style.transition = "opacity 0.3s ease";
            splash.style.opacity = "0";
            setTimeout(() => splash.remove(), 300);
          }
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById("root"), { childList: true });
    </script>
  </body>
</html>
